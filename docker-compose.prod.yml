# docker-compose.prod.yml
# Déploiement Portainer Stack pour Enop.ai (nouvelle version V1 multi-tenant)
#
# - Tourne EN PARALLÈLE de l'ancien stack 'agent' (port 5000) sans conflit
# - Ports hôte : 5001 (Flask), 5433 (Postgres) — modifiables via Portainer
# - Tous les secrets viennent des variables d'env Portainer (pas en clair ici)
# - L'app et la DB partagent le network Docker 'agent_default' existant
#   (évite l'erreur 'all predefined address pools have been fully subnetted')
#
# DÉPLOIEMENT :
#   Portainer > Stacks > + Add stack
#   - Name: enop2
#   - Build method: Repository
#   - Repository URL: https://github.com/MutedByTinnitus/compta-agent
#   - Compose path: docker-compose.prod.yml
#   - Environment variables: voir liste plus bas
#   - Deploy
#
# VARIABLES À DÉFINIR DANS PORTAINER :
#   ANTHROPIC_API_KEY=sk-ant-...
#   GEMINI_API_KEY=AIza...
#   GOOGLE_DOCAI_PROJECT_ID=compta-492313
#   GOOGLE_DOCAI_PROCESSOR_ID=c7966298766afaaf
#   SECRET_KEY=<générer 32+ chars aléatoires>
#   DB_PASSWORD=<choisir un mot de passe fort>
#   APP_USERNAME=admin
#   APP_PASSWORD=<nouveau mot de passe>
#   ALLOW_LEGACY_ADMIN=true       # à passer false une fois en prod sans tests
#   PRIMARY_LLM=gemini
#   HOST_PORT_APP=5000            # port exposé côté hôte pour Flask (5000 par défaut)
#   HOST_PORT_DB=5433             # port exposé côté hôte pour Postgres
#
# OPTIONNEL si tu utilises Google DocAI :
#   - place ton service_account.json dans /var/lib/portainer/enop2/credentials/
#   - ou ajuste le path du volume credentials ci-dessous

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enop2-app
    restart: unless-stopped
    ports:
      - "${HOST_PORT_APP:-5000}:5000"
    environment:
      DATABASE_URL: postgresql://enop:${DB_PASSWORD:-changeme}@db:5432/enop
      SECRET_KEY: ${SECRET_KEY:-dev_secret_change_me}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GOOGLE_DOCAI_PROJECT_ID: ${GOOGLE_DOCAI_PROJECT_ID}
      GOOGLE_DOCAI_PROCESSOR_ID: ${GOOGLE_DOCAI_PROCESSOR_ID}
      GOOGLE_APPLICATION_CREDENTIALS: /app/credentials/service_account.json
      PRIMARY_LLM: ${PRIMARY_LLM:-gemini}
      MAX_PAGES_PER_BATCH: ${MAX_PAGES_PER_BATCH:-50}
      APP_USERNAME: ${APP_USERNAME:-admin}
      APP_PASSWORD: ${APP_PASSWORD:-changeme}
      ALLOW_LEGACY_ADMIN: ${ALLOW_LEGACY_ADMIN:-true}
      # En prod derrière un reverse proxy HTTPS, mettre à true :
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    volumes:
      - enop2_outputs:/app/outputs
      - enop2_jobs:/app/jobs
      - enop2_logs:/app/logs
      - enop2_cache:/app/cache
      - enop2_review:/app/static/review
      # Credentials Google DocAI (à placer manuellement sur le serveur)
      - enop2_credentials:/app/credentials
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: enop2-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: enop
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: enop
    volumes:
      - enop2_pgdata:/var/lib/postgresql/data
    ports:
      - "${HOST_PORT_DB:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enop -d enop"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────────────────────────
  # BACKUP POSTGRES
  # ─────────────────────────────────────────────────────────────────
  # Image standard de la communauté qui fait pg_dump | gzip sur planning.
  # Garde 7 derniers backups quotidiens, 4 hebdo, 6 mensuels.
  # Stockés dans le volume nommé enop2_pgbackups (persistant).
  #
  # Restauration manuelle (sur le serveur, via Portainer console enop2-db) :
  #   gunzip -c /backups/last/enop-latest.sql.gz | psql -U enop -d enop
  #
  # Lister les backups dispo :
  #   docker exec enop2-db-backup ls -la /backups/last /backups/daily
  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    container_name: enop2-db-backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: enop
      POSTGRES_USER: enop
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_EXTRA_OPTS: '-Z9 --schema=public'  # compression max, schema public
      SCHEDULE: '@daily'                          # une fois par jour à 00:00 UTC
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080
    volumes:
      - enop2_pgbackups:/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  enop2_pgdata:
  enop2_pgbackups:
  enop2_outputs:
  enop2_jobs:
  enop2_logs:
  enop2_cache:
  enop2_review:
  enop2_credentials:

# On réutilise un network Docker EXISTANT au lieu d'en créer un nouveau.
# Raison : le serveur a déjà beaucoup de stacks, plus de plage IP dispo pour un nouveau /16.
# Le network 'agent_default' existe déjà (créé par l'ancien stack 'agent') et fonctionne.
networks:
  default:
    name: agent_default
    external: true
