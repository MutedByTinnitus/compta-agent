<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription — ENOP.AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<link rel="icon" href="{{ url_for('static', filename='img/logo-enop.svg') }}" type="image/svg+xml">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: #0a1410;
    color: #f5f0e6; font-family: 'Inter', system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .wrap { width: 100%; max-width: 480px; }
  .brand {
    font-family: 'Lora', Georgia, serif; font-size: 32px; font-weight: 500;
    text-align: center; margin-bottom: 8px; letter-spacing: -0.5px;
  }
  .brand .dot { color: #3dd9a8; }
  .tag { text-align: center; color: #8a9590; font-size: 13px; margin-bottom: 28px; }
  .card {
    background: #14201b; border: 1px solid #1f2d28;
    padding: 32px; border-radius: 16px;
  }
  h1 { font-family: 'Lora', Georgia, serif; font-size: 22px; font-weight: 500; margin: 0 0 4px; }
  .sub { font-size: 13px; color: #8a9590; margin-bottom: 18px; }
  label { display: block; font-size: 12px; color: #c5cdc8; margin-bottom: 6px; margin-top: 12px; }
  input {
    width: 100%; padding: 10px 12px; background: #0a1410;
    border: 1px solid #2a3530; color: #f5f0e6; border-radius: 8px;
    font-family: inherit; font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: #3dd9a8; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn {
    width: 100%; padding: 12px; margin-top: 22px;
    background: #3dd9a8; color: #0a1410; border: none; border-radius: 10px;
    font-weight: 600; font-size: 14px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: #4eecb8; }
  .err {
    background: rgba(232,93,93,.1); border: 1px solid rgba(232,93,93,.3);
    color: #e85d5d; padding: 10px 14px; border-radius: 8px;
    font-size: 13px; margin-bottom: 12px;
  }
  .alt { text-align: center; margin-top: 16px; font-size: 13px; color: #8a9590; }
  .alt a { color: #3dd9a8; text-decoration: none; }
  .hint { font-size: 11px; color: #6a7570; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">enop<span class="dot">.ai</span></div>
  <div class="tag">Plateforme cabinets d'expertise comptable</div>

  <div class="card">
    <h1>Créer un compte</h1>
    <div class="sub">Pour votre cabinet — accès beta</div>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <form method="POST" action="{{ url_for('auth.signup') }}">
      <div class="row">
        <div>
          <label for="first_name">Prénom</label>
          <input type="text" id="first_name" name="first_name" autocomplete="given-name">
        </div>
        <div>
          <label for="last_name">Nom</label>
          <input type="text" id="last_name" name="last_name" autocomplete="family-name">
        </div>
      </div>

      <label for="cabinet">Nom du cabinet *</label>
      <input type="text" id="cabinet" name="cabinet" required autocomplete="organization">

      <label for="siret">SIRET (optionnel)</label>
      <input type="text" id="siret" name="siret" pattern="[0-9\s]{14,17}" autocomplete="off">

      <label for="email">Email professionnel *</label>
      <input type="email" id="email" name="email" required autocomplete="email">

      <label for="password">Mot de passe *</label>
      <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
      <div class="hint">8 caractères minimum</div>

      <button class="btn" type="submit">Créer mon compte</button>
    </form>

    <div class="alt">Déjà inscrit ? <a href="{{ url_for('auth.login') }}">Se connecter</a></div>
  </div>
</div>
</body>
</html>
